      with_meter: 0.95
      with_step: 0.90
      fuzzy: 0.80
  forward:
    aliases:
      - forward
      - ahead
      - straight
      - 向前
      - 朝前
      - 朝向前
      - 面向
      - 前进
      - 往前
      - 向前进
      - 朝前走
      - 向前移
      - 前
      - 进
    confidence_tiers:
      with_meter: 0.95
      with_step: 0.90
      fuzzy: 0.80
  left:
    aliases:
      - left
      - 向左
      - 朝左
      - 左向
      - 左移
      - 左挪
      - 往左
      - 向左走
      - 向左移
      - 左边
      - 左侧
    confidence_tiers:
      with_meter: 0.95
      with_step: 0.90
      fuzzy: 0.80
  right:
    aliases:
      - right
      - 向右
      - 朝右
      - 右向
      - 右移
      - 右挪
      - 往右
      - 向右走
      - 向右移
      - 右边
      - 右侧
    confidence_tiers:
      with_meter: 0.95
      with_step: 0.90
      fuzzy: 0.80

distances:
