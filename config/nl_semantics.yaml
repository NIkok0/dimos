version: nl_semantics_v1

intents:
  move_relative:
    required_slots: [direction, distance_units]
    description: Move the robot in a relative direction
    llm_slots: [direction, distance_meters, speed]
  move_to_workspace:
    required_slots: [workspace_name]
    description: Navigate to a named workspace
    llm_slots: [workspace_name, workspace_color, approach_direction]
  pick_sku:
    required_slots: [workspace_name, workspace_color, sku_name, sku_color]
    description: Pick up an object from a workspace
    llm_slots: [workspace_type, table_color, object_type, object_color, goal_workspace_type, goal_table_color]
  fetch_sku:
    required_slots:
      - source_workspace_name
      - source_workspace_color
      - target_workspace_name
      - target_workspace_color
      - sku_name
      - sku_color
    description: Fetch an object from one workspace and deliver to another
    llm_slots:
      - source_workspace_name
      - source_workspace_color
      - target_workspace_name
      - target_workspace_color
      - sku_name
      - sku_color
  guard_loop:
    required_slots: [waypoints, loop_count]
    description: Patrol between multiple waypoints
    llm_slots: [waypoints, loop_count, patrol_speed]

pick:
  terms:
    - pick
    - pickup
    - pick up
    - grab
    - 抓
    - 抓取
    - 拿
    - 拿取
  table_colors:
    - blue
    - red
    - green
  trusted_combinations:
    blue: [red, yellow, green]
    red: [yellow, blue, green]
    green: [yellow, blue, red]

skus:
  cube:
    aliases: [cube, 方块, 立方体]
  box:
    aliases: [box, 盒子]
  bottle:
    aliases: [bottle, 瓶子]

fetch:
  keywords:
    - fetch
    - relocate
    - 拿到
    - 放到
    - 送到
    - 取到
    - 移动
    - 搬运
  alt_keywords:
    - 放下
    - dropit
    - drop
  sku_defaults:
    name: cube
    aliases:
      - cube
      - 方块
      - 立方体
      - box
      - 盒子
      - bottle
      - 瓶子

guard:
  keywords:
    - guard
    - patrol
    - 巡逻
    - 守卫
    - 巡查
    - 巡视
    - 巡防

loop_counts:
  semantic_aliases:
    "1": 1
    one: 1
    once: 1
    一圈: 1
    一次: 1
    "2": 2
    two: 2
    twice: 2
    两圈: 2
    二圈: 2
    两次: 2
    "3": 3
    three: 3
    thrice: 3
    三圈: 3
    三次: 3
    "4": 4
    four: 4
    四圈: 4
    四次: 4
    "5": 5
    five: 5
    五圈: 5
    五次: 5

movement_triggers:
  - move
  - navigate
  - goto
  - go
  - walk
  - drive
  - shift
  - slide
  - step
  - back
  - forward
  - head to
  - drive to
  - 移动
  - 导航
  - 前往
  - 前进
  - 后退
  - 转向
  - 走
  - 挪
  - 移
  - 动
  - 滑
  - 退
  - 进
  - 往后
  - 往前
  - 向前
  - 向后
  - 向左
  - 向右
  - 朝后
  - 朝前
  - 左移
  - 右移
  - 左挪
  - 右挪
  - 前移
  - 后移
  - 开到
  - 行至
  - 挪到

object_task_exclusions:
  - pick
  - fetch
  - drop
  - grab
  - place
  - put
  - 抓
  - 拿
  - 取
  - 放
  - 丢
  - 扔
  - 方块
  - 立方体
  - cube
  - box
  - object
  - 物体

