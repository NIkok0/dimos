    one: 1.0
    two: 2.0
    three: 3.0
    four: 4.0
    five: 5.0
    a bit: 0.5
    a little: 0.5
    a little bit: 0.3
    a step: 1.0
    two steps: 2.0
    three steps: 3.0
    half: 0.5
    half step: 0.5
    sliver: 0.3
    slightly: 0.3
    一: 1.0
    二: 2.0
    两: 2.0
    三: 3.0
    四: 4.0
    五: 5.0
    六: 6.0
    七: 7.0
    八: 8.0
    九: 9.0
    十: 10.0
    半: 0.5
    一点: 0.5
    一点点: 0.3
    一些: 1.0
    一步: 1.0
    两步: 2.0
    三步: 3.0
    稍微: 0.3
    轻微: 0.3
    少许: 0.5
    少量: 0.5
    一丢丢: 0.3
    一下: 0.5
    一丢: 0.3
    稍稍: 0.3
    一点点距离: 0.3
    格: 1.0
    格子: 1.0
    格点: 1.0
    个单位: 1.0
    单位: 1.0
    块: 1.0
    段: 2.0

colors:
  blue:
    aliases: [blue, 蓝色, 蓝]
    nl: 蓝色
  green:
    aliases: [green, 绿色, 绿]
    nl: 绿色
  red:
    aliases: [red, 红色, 红]
    nl: 红色
  yellow:
    aliases: [yellow, 黄色, 黄]
    nl: 黄色

direction_nl:
  forward: 向前
  backward: 向后
  left: 向左
  right: 向右

workspaces:
  front_workspace:
    requires_color: false
    aliases:
      - front_workspace
      - 前方固定工作区
      - 前方工作区
      - 前工作区
      - front
      - 去前面
  table:
    requires_color: true
    color_slot: workspace_color
    aliases:
      - table
      - 桌子
      - 桌
      - 工作台
      - 桌面

conflict_rules:
  - name: suppress_relative_when_workspace
    if_workspace_alias_present: true
    suppress_intent: move_relative

canonical_templates:
  move_relative: "{direction_nl}移动{distance_m}米"
  move_to_workspace:
    front_workspace: "移动到前方固定工作区"
    table: "前往{color_nl}桌子"

eval_templates:
  move_relative:
    - "{direction_alias}移动{distance}米"
    - "go {direction_alias} {distance}m"
    - "{direction_alias}{distance}格"
  move_to_workspace:
    - "{movement_trigger}{workspace_alias}"
    - "go to the {color_en} table"
    - "navigate to {color_en} table"
  pick_sku:
    - "去{goal_color_nl}桌子抓{color_nl}方块"
    - "pick the {color_en} cube from the {goal_color_en} table"
  fetch_sku:
    - "把{sku_color_nl}方块从{source_color_nl}桌子拿到{target_color_nl}桌子"
  guard_loop:
    - "在{source_color_nl}和{target_color_nl}桌子之间巡逻{loop_count_nl}"
