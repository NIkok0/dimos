# Per-robot joint poses for dax_server HTTP control (wave / head gestures).
# Copy or override per deployment: set DAX_ROBOT_JOINT_CONFIG_PATH in .env
#
# Units: arm joints radians (7-DOF), head [head_joint0, head_joint1] radians.

wave:
  # Dual-arm home before/after wave animation.
  home_left: [0.49968776484597655, 0.34976398209966364, 0.0, -1.4997614262387273, 0.0, -0.4497713482389387, 0.2]
  home_right: [-1.11065948, -0.9408707, 0.0107924733, -2.14151549, -1.30853546, 0.09318465, -0.119986169]
  rest_right: [0.49968776484597655, -0.34976398209966364, 0.0, -1.4997614262387273, 0.0, -0.4497713482389387, 0.2]
  start_index: 150
  send_count: 200
  send_interval: 0.01
  move_dt: 0.01

head:
  accept_steps:
    - [0.0, 0.5]
    - [0.0, 0.0]
    - [0.0, 0.5]
    - [0.0, 0.0]
  reject_steps:
    - [0.5, 0.0]
    - [0.0, 0.0]
    - [-0.5, 0.0]
    - [0.0, 0.0]
  time_from_start_s: 1.0
